<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E'lonlar — HomeUZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a2e; }
        .nav { background: #fff; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; color: #1565c0; text-decoration: none; }
        .logo span { color: #f57c00; }
        .nav-links a { margin-left: 24px; font-size: 14px; color: #555; text-decoration: none; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: #1565c0; }
        .theme-btn { background: none; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 6px 16px; font-size: 14px; cursor: pointer; margin-left: 16px; }
        .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; margin-left: 12px; }
        .burger span { width: 24px; height: 2px; background: #1565c0; border-radius: 2px; display: block; }
        .close-btn { display: none; position: fixed; top: 20px; right: 20px; z-index: 1001; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }

        .filter-bar { background: #fff; padding: 20px 40px; border-bottom: 1px solid #eee; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .filter-bar input { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 10px 16px; font-size: 14px; outline: none; flex: 1; min-width: 200px; }
        .filter-bar input:focus { border-color: #1565c0; }
        .filter-bar select { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 10px 12px; font-size: 14px; outline: none; background: #fff; cursor: pointer; }
        .btn-search { background: #1565c0; color: #fff; border: none; padding: 10px 28px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }

        .main { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
        .results-info { font-size: 14px; color: #888; margin-bottom: 20px; }
        .results-info span { color: #1565c0; font-weight: 700; }

        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.07); transition: transform .2s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); }
        .card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 56px; position: relative; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .blue   { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
        .green  { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
        .orange { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
        .purple { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
        .badge { position: absolute; top: 12px; left: 12px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge.sotib { background: #e3f2fd; color: #1565c0; }
        .badge.ijara { background: #e8f5e9; color: #2e7d32; }
        .card-body { padding: 18px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .card-loc { font-size: 13px; color: #888; margin-bottom: 6px; }
        .card-info { display: flex; gap: 12px; font-size: 12px; color: #aaa; margin-bottom: 12px; }
        .card-price { font-size: 20px; font-weight: 800; color: #f57c00; }

        .empty { text-align: center; padding: 60px; grid-column: 1/-1; }
        .empty-icon { font-size: 56px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 60px; color: #888; grid-column: 1/-1; }

        body.dark { background: #0f0f1a; color: #e0e0e0; }
        body.dark .nav { background: #1a1a2e; }
        body.dark .filter-bar { background: #1a1a2e; border-color: #333; }
        body.dark .filter-bar input, body.dark .filter-bar select { background: #252540; border-color: #333; color: #e0e0e0; }
        body.dark .card { background: #1a1a2e; }
        body.dark .card-title { color: #e0e0e0; }
        body.dark .burger span { background: #fff; }

        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .nav-links { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
            .nav-links.open { display: flex; }
            .nav-links a { margin-left: 0; font-size: 20px; color: #fff !important; }
            .burger { display: flex; }
            .filter-bar { padding: 12px 16px; flex-direction: column; }
            .filter-bar input, .filter-bar select, .btn-search { width: 100%; }
            .main { padding: 16px; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="logo">Home<span>UZ</span></a>
    <div class="nav-links" id="nav-links">
        <a href="index.html" onclick="burgerYop()">Bosh sahifa</a>
        <a href="listings.html" class="active" onclick="burgerYop()">E'lonlar</a>
        <a href="elon-berish.html" onclick="burgerYop()">E'lon berish</a>
        <a href="login.html" id="nav-kirish" onclick="burgerYop()">Kirish</a>
        <a href="kabinet.html" id="nav-kabinet" style="display:none" onclick="burgerYop()">👤 Kabinet</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="toggleDark()" id="theme-btn" class="theme-btn">🌙 Tun</button>
        <button class="burger" onclick="burgerOch()">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>
<button class="close-btn" onclick="burgerYop()" id="close-btn">✕</button>

<div class="filter-bar">
    <input type="text" placeholder="🔍 Shahar yoki tuman..." id="searchInput" oninput="filterCards()"/>
    <select id="typeFilter" onchange="filterCards()">
        <option value="">Tur: Hammasi</option>
        <option value="sotib">Sotib olish</option>
        <option value="ijara">Ijaraga olish</option>
    </select>
    <select id="roomFilter" onchange="filterCards()">
        <option value="">Xonalar: Hammasi</option>
        <option value="1">1 xona</option>
        <option value="2">2 xona</option>
        <option value="3">3 xona</option>
        <option value="4">4+ xona</option>
    </select>
    <select id="priceFilter" onchange="filterCards()">
        <option value="">Narx: Hammasi</option>
        <optgroup label="🏠 Sotish">
            <option value="s-low">$0 — $50,000</option>
            <option value="s-mid">$50,000 — $150,000</option>
            <option value="s-high">$150,000+</option>
        </optgroup>
        <optgroup label="🔑 Ijara (oylik)">
            <option value="i-low">$0 — $300/oy</option>
            <option value="i-mid">$300 — $700/oy</option>
            <option value="i-high">$700+/oy</option>
        </optgroup>
    </select>
    <button class="btn-search" onclick="filterCards()">Qidirish</button>
</div>

<div class="main">
    <div class="results-info"><span id="count">0</span> ta e'lon topildi</div>
    <div class="cards" id="cardGrid">
        <div class="loading">⏳ Yuklanmoqda...</div>
    </div>
</div>

<script>
const ranglar = ['blue','green','orange','purple'];
let barcha_elonlar = [];

const joriy_nav = JSON.parse(localStorage.getItem('joriy_foydalanuvchi') || 'null');
if (joriy_nav) {
    document.getElementById('nav-kirish').style.display = 'none';
    document.getElementById('nav-kabinet').style.display = 'inline';
}

if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent = '☀️ Kun';
}

function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '☀️ Kun' : '🌙 Tun';
}

function burgerOch() {
    document.getElementById('nav-links').classList.add('open');
    document.getElementById('close-btn').style.display = 'block';
}

function burgerYop() {
    document.getElementById('nav-links').classList.remove('open');
    document.getElementById('close-btn').style.display = 'none';
}

function vaqtniKorsat(sana) {
    if (!sana) return '';
    const farq = Math.floor((new Date() - new Date(sana)) / 1000);
    if (farq < 60) return 'Hozirgina';
    if (farq < 3600) return `${Math.floor(farq/60)} daqiqa oldin`;
    if (farq < 86400) return `${Math.floor(farq/3600)} soat oldin`;
    if (farq < 604800) return `${Math.floor(farq/86400)} kun oldin`;
    return `${Math.floor(farq/2592000)} oy oldin`;
}

const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('search')) document.getElementById('searchInput').value = urlParams.get('search');
if (urlParams.get('type')) document.getElementById('typeFilter').value = urlParams.get('type');

async function elonlarniYukla() {
    try {
        const res = await fetch('/api/elonlar');
        barcha_elonlar = await res.json();
        filterCards();
    } catch(err) {
        document.getElementById('cardGrid').innerHTML = '<div class="empty"><div class="empty-icon">❌</div><h3>Server bilan bog\'lanib bo\'lmadi</h3></div>';
    }
}

function kartaChiz(elon, i) {
    const rang = ranglar[i % ranglar.length];
    const ikona = elon.tur === 'ijara' ? '🔑' : '🏠';
    const narxMatn = elon.tur === 'ijara'
        ? `$${elon.narxi?.toLocaleString()}/oy`
        : `$${elon.narxi?.toLocaleString()}`;
    const imgHTML = elon.rasmlar?.length
        ? `<img src="${elon.rasmlar[0]}" style="width:100%;height:100%;object-fit:cover;"/>`
        : `<span>${ikona}</span>`;
    return `<div class="card" onclick="window.location='detail.html?id=${elon.id}'">
        <div class="card-img ${rang}">${imgHTML}<span class="badge ${elon.tur}">${elon.tur==='ijara'?'Ijara':'Sotish'}</span></div>
        <div class="card-body">
            <div class="card-title">${elon.nomi}</div>
            <div class="card-loc">📍 ${elon.shahar}</div>
            <div class="card-info"><span>📐 ${elon.maydon} m²</span><span>🛏 ${elon.xona} xona</span></div>
            <div class="card-price">${narxMatn}</div>
            <div style="font-size:11px;color:#aaa;margin-top:6px;">🕐 ${vaqtniKorsat(elon.sana)}</div>
        </div>
    </div>`;
}

function filterCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const type   = document.getElementById('typeFilter').value;
    const rooms  = document.getElementById('roomFilter').value;
    const price  = document.getElementById('priceFilter').value;

    let filtered = barcha_elonlar.filter(e => {
        if (search && !e.shahar?.toLowerCase().includes(search) && !e.nomi?.toLowerCase().includes(search)) return false;
        if (type && e.tur !== type) return false;
        if (rooms === '1' && e.xona !== 1) return false;
        if (rooms === '2' && e.xona !== 2) return false;
        if (rooms === '3' && e.xona !== 3) return false;
        if (rooms === '4' && e.xona < 4) return false;

        // Narx filtri
        if (price === 's-low'  && (e.tur !== 'sotib' || e.narxi > 50000)) return false;
        if (price === 's-mid'  && (e.tur !== 'sotib' || e.narxi < 50000 || e.narxi > 150000)) return false;
        if (price === 's-high' && (e.tur !== 'sotib' || e.narxi < 150000)) return false;
        if (price === 'i-low'  && (e.tur !== 'ijara' || e.narxi > 300)) return false;
        if (price === 'i-mid'  && (e.tur !== 'ijara' || e.narxi < 300 || e.narxi > 700)) return false;
        if (price === 'i-high' && (e.tur !== 'ijara' || e.narxi < 700)) return false;

        return true;
    });

    document.getElementById('count').textContent = filtered.length;

    if (!filtered.length) {
        document.getElementById('cardGrid').innerHTML = `
            <div class="empty">
                <div class="empty-icon">🔍</div>
                <h3>E'lon topilmadi</h3>
                <p>Boshqa filtr sinab ko'ring</p>
            </div>`;
        return;
    }
    document.getElementById('cardGrid').innerHTML = filtered.map((e,i) => kartaChiz(e,i)).join('');
}

elonlarniYukla();
</script>
</body>
</html>
