<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxsiy kabinet — HomeUZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a2e; }
        .nav { background: #fff; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; color: #1565c0; text-decoration: none; }
        .logo span { color: #f57c00; }
        .nav-links a { margin-left: 24px; font-size: 14px; color: #555; text-decoration: none; font-weight: 500; }
        .nav-links a:hover { color: #1565c0; }
        .theme-btn { background: none; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 6px 16px; font-size: 14px; cursor: pointer; margin-left: 16px; }
        .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; margin-left: 12px; }
        .burger span { width: 24px; height: 2px; background: #1565c0; border-radius: 2px; display: block; }
        .close-btn { display: none; position: fixed; top: 20px; right: 20px; z-index: 1001; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }

        .container { max-width: 1100px; margin: 0 auto; padding: 32px 40px 60px; }

        .profil-card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); margin-bottom: 28px; display: flex; align-items: center; gap: 24px; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #1565c0, #0d47a1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; flex-shrink: 0; font-weight: 800; }
        .profil-info h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .profil-info p { font-size: 14px; color: #888; }
        .profil-stats { display: flex; gap: 32px; margin-left: auto; }
        .pstat { text-align: center; }
        .pstat strong { display: block; font-size: 24px; font-weight: 800; color: #1565c0; }
        .pstat span { font-size: 12px; color: #aaa; }

        .coin-card { background: linear-gradient(135deg, #f57c00, #e65100); border-radius: 20px; padding: 24px 32px; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
        .coin-left h3 { font-size: 16px; color: #ffe0b2; margin-bottom: 4px; }
        .coin-left strong { font-size: 36px; font-weight: 800; color: #fff; }
        .coin-right { display: flex; gap: 12px; }
        .coin-btn { background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4); color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .coin-btn.primary { background: #fff; color: #e65100; border-color: #fff; }

        .tabs { display: flex; gap: 4px; background: #f0f4ff; border-radius: 14px; padding: 4px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; color: #888; border: none; background: transparent; }
        .tab.active { background: #fff; color: #1565c0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .elon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .elon-karta { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .elon-img { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; overflow: hidden; }
        .elon-img img { width: 100%; height: 100%; object-fit: cover; }
        .elon-badge { position: absolute; top: 10px; left: 10px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-sotib { background: #e3f2fd; color: #1565c0; }
        .badge-ijara { background: #e8f5e9; color: #2e7d32; }
        .elon-body { padding: 16px; }
        .elon-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .elon-loc { font-size: 12px; color: #888; margin-bottom: 8px; }
        .elon-meta { display: flex; align-items: center; margin-bottom: 12px; }
        .elon-price { font-size: 16px; font-weight: 800; color: #f57c00; }
        .elon-views { font-size: 12px; color: #aaa; margin-left: auto; }
        .elon-actions { display: flex; gap: 8px; }
        .btn-edit { flex: 1; background: #f0f4ff; color: #1565c0; border: none; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-premium { flex: 1; background: #fff3e0; color: #e65100; border: none; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-delete { background: #fce4ec; color: #c62828; border: none; padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }

        .sev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .sev-karta { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: transform .2s; }
        .sev-karta:hover { transform: translateY(-3px); }
        .sev-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
        .sev-body { padding: 14px; }
        .sev-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .sev-loc { font-size: 12px; color: #888; margin-bottom: 8px; }
        .sev-footer { display: flex; align-items: center; justify-content: space-between; }
        .sev-price { font-size: 15px; font-weight: 800; color: #f57c00; }
        .btn-unsave { background: none; border: none; color: #e53935; font-size: 18px; cursor: pointer; }

        .empty { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty h3 { font-size: 16px; color: #888; margin-bottom: 8px; }
        .btn-add { display: inline-block; margin-top: 16px; background: #1565c0; color: #fff; padding: 12px 28px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 14px; }

        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
        .modal-bg.open { display: flex; }
        .modal { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 500px; }
        .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
        .modal label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 6px; margin-top: 14px; }
        .modal input, .modal textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; font-family: inherit; }
        .modal textarea { height: 80px; resize: none; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; background: #1565c0; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
        .btn-cancel { background: #f0f4ff; color: #1565c0; border: none; padding: 12px 20px; border-radius: 10px; font-size: 15px; cursor: pointer; }

        /* DARK */
        body.dark { background: #0f0f1a; color: #e0e0e0; }
        body.dark .nav { background: #1a1a2e; }
        body.dark .profil-card, body.dark .elon-karta, body.dark .sev-karta, body.dark .modal { background: #1a1a2e; }
        body.dark .tabs { background: #1a1a2e; }
        body.dark .tab.active { background: #252540; }
        body.dark .btn-edit { background: #252540; }
        body.dark .modal input, body.dark .modal textarea { background: #252540; border-color: #333; color: #e0e0e0; }
        body.dark .burger span { background: #fff; }

        /* MOBIL */
        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .nav-links { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
            .nav-links.open { display: flex; }
            .nav-links a { margin-left: 0; font-size: 20px; color: #fff !important; }
            .burger { display: flex; }
            .container { padding: 16px; }
            .profil-card { flex-direction: column; text-align: center; }
            .profil-stats { margin-left: 0; margin-top: 16px; }
            .coin-card { flex-direction: column; gap: 16px; }
            .coin-right { flex-direction: column; }
            .elon-grid, .sev-grid { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="logo">Home<span>UZ</span></a>
    <div class="nav-links" id="nav-links">
        <a href="index.html" onclick="burgerYop()">Bosh sahifa</a>
        <a href="listings.html" onclick="burgerYop()">E'lonlar</a>
        <a href="elon-berish.html" onclick="burgerYop()">E'lon berish</a>
        <a href="login.html" id="nav-kirish" onclick="burgerYop()">Kirish</a>
        <a href="kabinet.html" id="nav-kabinet" style="display:none" onclick="burgerYop()">👤 Kabinet</a>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="toggleDark()" id="theme-btn" class="theme-btn">🌙 Tun</button>
        <button class="burger" onclick="burgerOch()">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>
<button class="close-btn" onclick="burgerYop()" id="close-btn">✕</button>

<div class="container">
    <div class="profil-card">
        <div class="avatar" id="avatar">👤</div>
        <div class="profil-info">
            <h2 id="profil-ism">Yuklanmoqda...</h2>
            <p id="profil-email"></p>
            <p id="profil-telefon" style="color:#1565c0;font-weight:600;margin-top:4px;"></p>
            <button onclick="profilTahrir()" style="margin-top:12px;background:#f0f4ff;color:#1565c0;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">✏️ Profilni tahrirlash</button>
        </div>
        <div class="profil-stats">
            <div class="pstat"><strong id="stat-elon">0</strong><span>E'lonlar</span></div>
            <div class="pstat"><strong id="stat-views">0</strong><span>Ko'rishlar</span></div>
            <div class="pstat"><strong id="stat-sev">0</strong><span>Sevimlilar</span></div>
        </div>
    </div>

    <div class="coin-card">
        <div class="coin-left">
            <h3>🪙 HomeUZ Coins</h3>
            <strong><span id="coin-miqdor">0</span> coin</strong>
        </div>
        <div class="coin-right">
            <button class="coin-btn" onclick="kunlikBonus()">🎁 Kunlik bonus</button>
            <button class="coin-btn primary" onclick="premiumModal()">⭐ Premium — 80 coin</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="tabOch('elonlar', this)">🏠 E'lonlarim</button>
        <button class="tab" onclick="tabOch('sevimlilar', this)">❤️ Sevimlilar</button>
        <button class="tab" onclick="tabOch('faoliyat', this)">📊 Faoliyat</button>
    </div>

    <div id="tab-elonlar">
        <div id="elon-grid" class="elon-grid">
            <div class="empty" style="grid-column:1/-1"><div class="empty-icon">⏳</div><h3>Yuklanmoqda...</h3></div>
        </div>
    </div>

    <div id="tab-sevimlilar" style="display:none">
        <div id="sev-grid" class="sev-grid"></div>
    </div>

    <div id="tab-faoliyat" style="display:none">
        <div style="background:#fff;border-radius:20px;padding:32px;box-shadow:0 2px 16px rgba(0,0,0,0.07);">
            <h3 style="font-size:18px;font-weight:800;margin-bottom:20px;">📊 Faoliyat tarixi</h3>
            <div id="faoliyat-list"></div>
        </div>
    </div>
</div>

<!-- PROFIL TAHRIRLASH MODAL -->
<div class="modal-bg" id="profil-modal">
    <div class="modal">
        <h3>✏️ Profilni tahrirlash</h3>
        <label>Ismingiz</label>
        <input type="text" id="profil-edit-ism" />
        <label>Telefon</label>
        <input type="tel" id="profil-edit-telefon" />
        <div class="modal-actions">
            <button class="btn-cancel" onclick="document.getElementById('profil-modal').classList.remove('open')">Bekor</button>
            <button class="btn-save" onclick="profilniSaqla()">💾 Saqlash</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="edit-modal">
    <div class="modal">
        <h3>✏️ E'lonni tahrirlash</h3>
        <input type="hidden" id="edit-id"/>
        <label>Sarlavha</label>
        <input type="text" id="edit-nomi"/>
        <label>Shahar</label>
        <input type="text" id="edit-shahar"/>
        <label>Narx ($)</label>
        <input type="number" id="edit-narxi"/>
        <label>Tavsif</label>
        <textarea id="edit-tavsif"></textarea>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="modalYop()">Bekor</button>
            <button class="btn-save" onclick="elonniSaqla()">💾 Saqlash</button>
        </div>
    </div>
</div>

<script>
const joriy = JSON.parse(localStorage.getItem('joriy_foydalanuvchi') || 'null');
if (!joriy) { window.location.href = 'login.html'; }

const joriy_nav = joriy;
if (joriy_nav) {
    document.getElementById('nav-kirish').style.display = 'none';
    document.getElementById('nav-kabinet').style.display = 'inline';
}

if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent = '☀️ Kun';
}

function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('theme-btn').textContent = isDark ? '☀️ Kun' : '🌙 Tun';
}

function burgerOch() {
    document.getElementById('nav-links').classList.add('open');
    document.getElementById('close-btn').style.display = 'block';
}

function burgerYop() {
    document.getElementById('nav-links').classList.remove('open');
    document.getElementById('close-btn').style.display = 'none';
}

document.getElementById('profil-ism').textContent = joriy?.ism || 'Foydalanuvchi';
document.getElementById('profil-email').textContent = joriy?.email || '';
document.getElementById('profil-telefon').textContent = joriy?.telefon || '';
document.getElementById('avatar').textContent = joriy?.ism?.charAt(0)?.toUpperCase() || '👤';

function coinOl() { return parseInt(localStorage.getItem('coin_' + joriy?.email) || '0'); }
function coinSet(n) { localStorage.setItem('coin_' + joriy?.email, n); document.getElementById('coin-miqdor').textContent = n; }

// Sahifa ochilganda coin yangilansin
document.addEventListener('DOMContentLoaded', () => {
    coinSet(coinOl());
});
coinSet(coinOl());

function kunlikBonus() {
    const bugun = new Date().toDateString();
    const oxirgi = localStorage.getItem('oxirgi_bonus_' + joriy?.email);
    if (oxirgi === bugun) { alert('Bugungi bonus allaqachon olindi! ✅\nErtaga keling 🕐'); return; }
    const yangi = coinOl() + 5;
    coinSet(yangi);
    localStorage.setItem('oxirgi_bonus_' + joriy?.email, bugun);
    faoliyatQosh('🎁 Kunlik bonus: +5 coin');
    alert('✅ +5 coin olindi!\nJami: ' + yangi + ' coin');
}

function premiumModal() {
    const coin = coinOl();
    if (coin < 80) { alert(`❌ Yetarli coin yo'q!\nSizda: ${coin} coin\nKerak: 80 coin`); return; }
    alert('⭐ Premium funksiya tez orada!');
}

function tabOch(id, el) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + id).style.display = 'block';
    el.classList.add('active');
}

async function elonlarniYukla() {
    try {
        const res = await fetch('/api/elonlar');
        const hammasi = await res.json();
        const mening = hammasi.filter(e => e.email === joriy?.email || e.ism === joriy?.ism);
        document.getElementById('stat-elon').textContent = mening.length;
        document.getElementById('stat-views').textContent = mening.reduce((s,e) => s+(e.views||0), 0);
        const ranglar = ['linear-gradient(135deg,#e3f2fd,#bbdefb)','linear-gradient(135deg,#e8f5e9,#c8e6c9)','linear-gradient(135deg,#fff3e0,#ffe0b2)','linear-gradient(135deg,#f3e5f5,#e1bee7)'];
        if (!mening.length) {
            document.getElementById('elon-grid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏠</div><h3>Hali e'lon qo'ymadingiz</h3><a href="elon-berish.html" class="btn-add">+ E'lon berish</a></div>`;
            return;
        }
        document.getElementById('elon-grid').innerHTML = mening.map((e,i) => {
            const imgHTML = e.rasmlar?.length ? `<img src="${e.rasmlar[0]}" style="width:100%;height:100%;object-fit:cover;"/>` : `<span>${e.tur==='ijara'?'🔑':'🏠'}</span>`;
            const narxMatn = e.tur==='ijara' ? `$${e.narxi?.toLocaleString()}/oy` : `$${e.narxi?.toLocaleString()}`;
            return `<div class="elon-karta">
                <div class="elon-img" style="background:${ranglar[i%ranglar.length]}">${imgHTML}<span class="elon-badge badge-${e.tur}">${e.tur==='ijara'?'Ijara':'Sotish'}</span></div>
                <div class="elon-body">
                    <div class="elon-title">${e.nomi}</div>
                    <div class="elon-loc">📍 ${e.shahar}</div>
                    <div class="elon-meta"><div class="elon-price">${narxMatn}</div><div class="elon-views">👁️ ${e.views||0}</div></div>
                    <div class="elon-actions">
                        <button class="btn-edit" onclick="elonniTahrir(${e.id})">✏️ Tahrirlash</button>
                        <button class="btn-premium" onclick="premiumModal()">⭐ Premium</button>
                        <button class="btn-delete" onclick="elonniOchir(${e.id})">🗑️</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch(err) {
        document.getElementById('elon-grid').innerHTML = '<p style="color:#888">Server bilan bog\'lanib bo\'lmadi</p>';
    }
}

async function elonniOchir(id) {
    if (!confirm('❗ O\'chirishni tasdiqlaysizmi?')) return;
    await fetch(`/api/elonlar/${id}`, { method: 'DELETE' });
    faoliyatQosh('🗑️ E\'lon o\'chirildi');
    elonlarniYukla();
}

async function elonniTahrir(id) {
    const res = await fetch(`/api/elonlar/${id}`);
    const elon = await res.json();
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-nomi').value = elon.nomi;
    document.getElementById('edit-shahar').value = elon.shahar;
    document.getElementById('edit-narxi').value = elon.narxi;
    document.getElementById('edit-tavsif').value = elon.tavsif;
    document.getElementById('edit-modal').classList.add('open');
}

async function elonniSaqla() {
    const id = document.getElementById('edit-id').value;
    const res = await fetch('/api/elonlar');
    const hammasi = await res.json();
    const elon = hammasi.find(e => e.id === parseInt(id));
    if (!elon) return;
    elon.nomi   = document.getElementById('edit-nomi').value;
    elon.shahar = document.getElementById('edit-shahar').value;
    elon.narxi  = parseInt(document.getElementById('edit-narxi').value);
    elon.tavsif = document.getElementById('edit-tavsif').value;
    await fetch('/api/elonlar/' + id, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(elon) });
    modalYop();
    faoliyatQosh('✏️ E\'lon tahrirlandi');
    elonlarniYukla();
}

function modalYop() { document.getElementById('edit-modal').classList.remove('open'); }

function profilTahrir() {
    document.getElementById('profil-edit-ism').value = joriy?.ism || '';
    document.getElementById('profil-edit-telefon').value = joriy?.telefon || '';
    document.getElementById('profil-modal').classList.add('open');
}

function profilniSaqla() {
    const yangiIsm = document.getElementById('profil-edit-ism').value;
    const yangiTel = document.getElementById('profil-edit-telefon').value;
    if (!yangiIsm || !yangiTel) { alert('❌ Barcha maydonlarni to\'ldiring!'); return; }
    const yangilangan = { ...joriy, ism: yangiIsm, telefon: yangiTel };
    localStorage.setItem('joriy_foydalanuvchi', JSON.stringify(yangilangan));
    const foydalanuvchilar = JSON.parse(localStorage.getItem('foydalanuvchilar') || '[]');
    const idx = foydalanuvchilar.findIndex(f => f.email === joriy.email);
    if (idx !== -1) { foydalanuvchilar[idx] = { ...foydalanuvchilar[idx], ism: yangiIsm, telefon: yangiTel }; }
    localStorage.setItem('foydalanuvchilar', JSON.stringify(foydalanuvchilar));
    document.getElementById('profil-modal').classList.remove('open');
    document.getElementById('profil-ism').textContent = yangiIsm;
    document.getElementById('profil-telefon').textContent = yangiTel;
    document.getElementById('avatar').textContent = yangiIsm.charAt(0).toUpperCase();
    alert('✅ Profil yangilandi!');
}

function sevimlilarniKorsat() {
    const sevimlilar = JSON.parse(localStorage.getItem('sevimlilar_' + joriy?.email) || '[]');
    document.getElementById('stat-sev').textContent = sevimlilar.length;
    const ranglar = ['linear-gradient(135deg,#e3f2fd,#bbdefb)','linear-gradient(135deg,#e8f5e9,#c8e6c9)','linear-gradient(135deg,#fff3e0,#ffe0b2)'];
    if (!sevimlilar.length) {
        document.getElementById('sev-grid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">❤️</div><h3>Saqlangan e'lonlar yo'q</h3><a href="listings.html" class="btn-add">E'lonlarni ko'rish</a></div>`;
        return;
    }
    document.getElementById('sev-grid').innerHTML = sevimlilar.map((e,i) => `
        <div class="sev-karta" onclick="window.location='detail.html?id=${e.id}'">
            <div class="sev-img" style="background:${ranglar[i%ranglar.length]}">${e.tur==='ijara'?'🔑':'🏠'}</div>
            <div class="sev-body">
                <div class="sev-title">${e.nomi}</div>
                <div class="sev-loc">📍 ${e.shahar}</div>
                <div class="sev-footer">
                    <div class="sev-price">$${e.narxi?.toLocaleString()}</div>
                    <button class="btn-unsave" onclick="event.stopPropagation();sevimlidanOchir(${e.id})">🗑️</button>
                </div>
            </div>
        </div>`).join('');
}

function sevimlidanOchir(id) {
    let sev = JSON.parse(localStorage.getItem('sevimlilar_' + joriy?.email) || '[]');
    sev = sev.filter(e => e.id !== id);
    localStorage.setItem('sevimlilar_' + joriy?.email, JSON.stringify(sev));
    sevimlilarniKorsat();
}

function faoliyatQosh(xabar) {
    const key = 'faoliyat_' + joriy?.email;
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.unshift({ xabar, vaqt: new Date().toLocaleString('uz-UZ') });
    if (list.length > 20) list.pop();
    localStorage.setItem(key, JSON.stringify(list));
    faoliyatniKorsat();
}

function faoliyatniKorsat() {
    const list = JSON.parse(localStorage.getItem('faoliyat_' + joriy?.email) || '[]');
    if (!list.length) { document.getElementById('faoliyat-list').innerHTML = '<p style="color:#aaa;text-align:center;padding:20px">Hali faoliyat yo\'q</p>'; return; }
    document.getElementById('faoliyat-list').innerHTML = list.map(f => `
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0">
            <span style="font-size:20px">${f.xabar.split(' ')[0]}</span>
            <div><div style="font-size:14px;font-weight:600">${f.xabar}</div><div style="font-size:12px;color:#aaa">${f.vaqt}</div></div>
        </div>`).join('');
}

const bugun = new Date().toDateString();
if (localStorage.getItem('oxirgi_bonus_' + joriy?.email) !== bugun) faoliyatQosh('🔐 Tizimga kirdingiz');

elonlarniYukla();
sevimlilarniKorsat();
faoliyatniKorsat();
</script>
</body>
</html>
